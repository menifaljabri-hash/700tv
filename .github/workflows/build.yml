name: Build 700TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          # Use the pre-installed Android SDK on GitHub runners
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME || echo "ANDROID_HOME not set"
          ls /usr/local/lib/android/sdk || echo "no sdk at /usr/local/lib/android/sdk"

      - name: Setup SDK packages
        run: |
          SDK_DIR=/usr/local/lib/android/sdk
          echo "sdk.dir=$SDK_DIR" > local.properties
          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          
          # Accept licenses
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Install needed packages
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          # Download gradle wrapper jar
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip
          unzip -p /tmp/gradle.zip gradle-8.4/lib/gradle-wrapper.jar > gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ls -lh gradle/wrapper/

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 700TV-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
