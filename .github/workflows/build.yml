name: Build 700TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/temurin-17-amd64
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java 17
        run: |
          wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | sudo apt-key add -
          echo "deb https://packages.adoptium.net/artifactory/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/adoptium.list
          sudo apt-get update -q
          sudo apt-get install -y temurin-17-jdk
          java -version

      - name: Verify pre-installed Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/cmdline-tools/latest/bin/
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install SDK packages
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip
          unzip -p /tmp/gradle.zip gradle-8.4/lib/gradle-wrapper.jar > gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          echo "JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar)"

      - name: Build Debug APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 700TV-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
