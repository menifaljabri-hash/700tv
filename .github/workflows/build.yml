name: Build 700TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          accept-android-sdk-licenses: true
          packages: >-
            platforms;android-34
            build-tools;34.0.0
            platform-tools

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
            -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip \
            "gradle-8.4/lib/gradle-wrapper.jar" \
            > gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar)"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: 700TV-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
