name: Build 700TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone repo
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Build APK
        run: |
          set -e
          java -version

          SDK=/usr/local/lib/android/sdk
          echo "sdk.dir=$SDK" > local.properties
          export ANDROID_HOME=$SDK

          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

          mkdir -p gradle/wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/g.zip
          unzip -p /tmp/g.zip gradle-8.4/lib/gradle-wrapper.jar > gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK to GitHub Release
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK found: $APK"

          # Create a release via GitHub API
          RELEASE=$(curl -s -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"build-${{ github.run_number }}\",\"name\":\"700TV Build #${{ github.run_number }}\",\"body\":\"Auto build\",\"draft\":false,\"prerelease\":true}" \
            "https://api.github.com/repos/${{ github.repository }}/releases")

          UPLOAD_URL=$(echo $RELEASE | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'])" | sed 's/{?name,label}//')
          echo "Upload URL: $UPLOAD_URL"

          # Upload APK to release
          curl -s -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK" \
            "${UPLOAD_URL}?name=700TV-debug.apk"

          echo "✅ APK uploaded to GitHub Releases!"
