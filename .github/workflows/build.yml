name: Build 700TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup and Build
        run: |
          set -e
          
          # Java 17 is pre-installed on ubuntu-22.04
          java -version
          
          # Android SDK is pre-installed
          SDK=/usr/local/lib/android/sdk
          echo "sdk.dir=$SDK" > local.properties
          
          # Accept licenses
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          
          # Install required packages
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          
          # Get Gradle wrapper JAR
          mkdir -p gradle/wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/g.zip
          unzip -p /tmp/g.zip gradle-8.4/lib/gradle-wrapper.jar > gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
          # Build
          export ANDROID_HOME=$SDK
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: 700TV-apk
          path: app/build/outputs/apk/debug/*.apk
