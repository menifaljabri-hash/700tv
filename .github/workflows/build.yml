name: Build 700TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          set -e

          java -version

          SDK=/usr/local/lib/android/sdk
          echo "sdk.dir=$SDK" > local.properties
          export ANDROID_HOME=$SDK

          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

          mkdir -p gradle/wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/g.zip
          unzip -p /tmp/g.zip gradle-8.4/lib/gradle-wrapper.jar > gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: 700TV-apk
          path: app/build/outputs/apk/debug/*.apk
